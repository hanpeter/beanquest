app = "beanquest"
primary_region = "lax"

[build]
  image = "ghcr.io/hanpeter/beanquest:latest"

[env]
  TMPDIR = "/tmp"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 2

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
